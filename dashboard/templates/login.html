<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вхід — Magazine Shoes</title>
<style>
  :root { --bg: #0b0c10; --card: #1a1b24; --border: #252633; --text: #e2e4f0; --muted: #7c7e9a; --accent: #6c63ff; --bad: #ff5c5c; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text);
         display: flex; align-items: center; justify-content: center; height: 100vh; }
  .box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 280px; text-align: center; }
  .brand { font-weight: 900; letter-spacing: 1px; margin-bottom: 20px; font-size: 15px; }
  input { width: 100%; padding: 10px; background: #13141a; border: 1px solid #2e3045; color: var(--text); border-radius: 6px; font-size: 16px; margin-bottom: 12px; text-align: center; }
  button { width: 100%; padding: 10px; background: rgba(108,99,255,0.15); border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .error { color: var(--bad); font-size: 12px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="box">
  <div class="brand">👟 MAGAZINE SHOES</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="password" name="password" placeholder="Пароль" autofocus required>
    <button type="submit">Увійти</button>
  </form>
</div>
</body>
</html>
